    is_global: true
    timeout_ms: 5000
    url: "https://webhook.snapz.co/88754d4d-9cc7-4983-9d25-553fc93057bc"
    method: POST
    headers:
      Content-Type: "application/json"
      # Authorization: "Bearer ${WEBHOOK_API_KEY}"
    payload_template: |
      {
        "schema_version": 1,
        "event_type": "call_completed",
        "session_id": "{session_id}",
        "call_id": "{call_id}",
        "caller_number": "{caller_number}",
        "caller_name": "{caller_name}",
        "call_duration": {call_duration},
        "call_outcome": "{call_outcome}",
        "transcript": {transcript_json},
        "context": "{context_name}",
        "provider": "{provider}",
        "timestamp": "{call_end_time}",
        "session_stats": {session_stats_json},
        "call_metadata": {call_metadata_json}
      }

  # Example: Discord webhook - posts call summary to a Discord channel (context-specific)
